<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Panel Administrador</title>
    <link rel="stylesheet" href="forms.css" />
  </head>
  <header>
    <h1>Formulario Arteguay</h1>
  </header>
  <body>
    <form id="formArticulo">
      <input type="text" id="titulo" placeholder="Título" required />

      <input type="text" id="categoria" placeholder="Categoría" required />

      <input type="text" id="autor" placeholder="Autor" required />

      <input type="text" id="imagen" placeholder="URL de la imagen" />

      <input type="date" id="fecha" required />

      <textarea
        id="contenido"
        placeholder="Contenido del artículo"
        required
      ></textarea>

      <button type="submit">Publicar artículo</button>
    </form>

    <p id="mensaje"></p>
    <footer>
      <a
        href="http://127.0.0.1:5501/FRONT/ArticulosyPortadas/portada.html"
        class="btn"
        >Inicio</a
      >
    </footer>
    <script src="forms.js"></script>
  </body>
</html>
